




name: DevOps Pipeline Titanic

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: titanic-dashboard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------
  # ✅ JOB 1 : LINT + TEST
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code
        run: flake8 . --ignore=F401,E302,E305,W292

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  # ---------------------------
  # 📊 JOB 2 : RAPPORT HTML (ydata-profiling)
  # ---------------------------
  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ydata-profiling

      - name: Generate profiling report
        run: |
          python -c "
          import seaborn as sns
          from ydata_profiling import ProfileReport
          
          # Charger le dataset Titanic
          print('📊 Loading Titanic dataset...')
          df = sns.load_dataset('titanic')
          
          # Nettoyer les données
          print('🧹 Cleaning data...')
          df = df.dropna(subset=['age', 'embarked'])
          
          # Générer le rapport
          print('📈 Generating profiling report...')
          profile = ProfileReport(
              df, 
              title='Titanic Dataset Analysis Report',
              explorative=True,
              minimal=False
          )
          
          # Sauvegarder le rapport
          print('💾 Saving report...')
          profile.to_file('titanic-report.html')
          print('✅ Report generated successfully!')
          "

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: titanic-report
          path: titanic-report.html
          retention-days: 30

      - name: Display report info
        run: |
          echo "📄 Report generated: titanic-report.html"
          ls -lh titanic-report.html
