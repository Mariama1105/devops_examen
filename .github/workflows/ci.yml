name: DevOps Pipeline Titanic

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: titanic-dashboard

jobs:

  # ---------------------------
  # ✅ JOB 1 : LINT + TEST
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code
        run: flake8 .

      - name: Run tests
        run: pytest tests/

  # ---------------------------
  # 📊 JOB 2 : REPORT
  # ---------------------------
  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Generate report
        run: |
          echo "<h1>Rapport Titanic</h1>" > report.html
          echo "<p>Pipeline OK ✅</p>" >> report.html

      - name: Upload artifact (simulate Nexus)
        uses: actions/upload-artifact@v4
        with:
          name: titanic-report
          path: report.html

  # ---------------------------
  # 🐳 JOB 3 : DOCKER BUILD & PUSH
  # ---------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Tag image
        run: docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

  # ---------------------------
  # 🚀 JOB 4 : DEPLOY
  # ---------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Deploy with docker-compose
        run: |
          echo "Simulated deploy..."