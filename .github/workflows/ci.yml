name: DevOps Pipeline Titanic

on:
  push:
    branches: [ "main" ]

env:
  IMAGE_NAME: titanic-dashboard
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ---------------------------
  # ✅ JOB 1 : LINT + TEST
  # ---------------------------
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint code
        run: flake8 . --ignore=F401,E302,E305,W292,E501,W291,W293,E225

      - name: Run tests
        run: PYTHONPATH=. pytest tests/ -v

  # ---------------------------
  # 📊 JOB 2 : RAPPORT HTML (ydata-profiling)
  # ---------------------------
  report:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Python setup
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ydata-profiling

      - name: Generate profiling report
        run: |
          python -c "
          import seaborn as sns
          from ydata_profiling import ProfileReport
          
          # Charger le dataset Titanic
          print('📊 Loading Titanic dataset...')
          df = sns.load_dataset('titanic')
          
          # Nettoyer les données
          print('🧹 Cleaning data...')
          df = df.dropna(subset=['age', 'embarked'])
          
          # Générer le rapport
          print('📈 Generating profiling report...')
          profile = ProfileReport(
              df, 
              title='Titanic Dataset Analysis Report',
              explorative=True,
              minimal=False
          )
          
          # Sauvegarder le rapport
          print('💾 Saving report...')
          profile.to_file('titanic-report.html')
          print('✅ Report generated successfully!')
          "

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: titanic-report
          path: titanic-report.html
          retention-days: 30

      - name: Display report info
        run: |
          echo "📄 Report generated: titanic-report.html"
          ls -lh titanic-report.html

  # ---------------------------
  # 📦 JOB 3 : UPLOAD TO NEXUS
  # ---------------------------
  upload-to-nexus:
    runs-on: ubuntu-latest
    needs: report
    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: titanic-report
          path: ./report

      - name: Upload to Nexus
        run: |
          curl -v -u admin:nafi198219 \
            --upload-file ./report/titanic-report.html \
            "http://localhost:8081/repository/titanic-reports/titanic-report-$(date +'%Y%m%d-%H%M%S').html"

  # ---------------------------
  # 🐳 JOB 4 : DOCKER BUILD & PUSH
  # ---------------------------
  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        run: docker build -t $IMAGE_NAME:${{ github.sha }} .

      - name: Tag image
        run: docker tag $IMAGE_NAME:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

      - name: Push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/$IMAGE_NAME:latest

  # ---------------------------
  # 🚀 JOB 5 : DEPLOY
  # ---------------------------
  deploy:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy with docker-compose
        run: |
          echo "Simulated deploy..."

          #fienalite